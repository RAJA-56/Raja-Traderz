<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITH ANIME | Premium Boutique</title>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #ffffff;
            --text: #050505;
            --card: #f8f9fa;
            --overlay: rgba(255, 255, 255, 0.9);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg: #0a0a0a;
            --text: #ffffff;
            --card: #151515;
            --overlay: rgba(10, 10, 10, 0.95);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        .logo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }
        .logo span { color: var(--primary); }

        .btn-theme {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- HERO --- */
        .hero {
            padding: 100px 8% 60px;
            text-align: center;
        }
        .hero h1 { font-size: 4rem; margin: 0; letter-spacing: -2px; }

        /* --- PRODUCT GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 0 8% 100px;
        }

        .product-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .product-info { padding: 25px; }
        .product-info h3 { margin: 0 0 10px; font-size: 1.4rem; }
        .price { color: var(--primary); font-weight: 700; font-size: 1.2rem; }

        /* --- PROFESSIONAL MODAL (POPUP) --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card);
            width: 90%;
            max-width: 900px;
            border-radius: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
        }

        .modal-img { width: 100%; height: 100%; object-fit: cover; }
        .modal-details { padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        
        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text);
            z-index: 10;
        }

        .btn-buy {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; }
            .modal-img { height: 300px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">ZENITH<span>ANIME</span></div>
    <button class="btn-theme" onclick="toggleTheme()">MODE</button>
</nav>

<div class="hero">
    <h1>LEGENDARY DROP</h1>
    <p>Premium collectibles for the modern Otaku.</p>
</div>

<div class="grid" id="productGrid">
    <!-- Products will be generated by JS -->
</div>

<!-- THE MODAL -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img src="" id="modalImg" class="modal-img">
        <div class="modal-details">
            <h2 id="modalTitle">Product Name</h2>
            <p id="modalDesc">This is a highly detailed description of the anime product, including materials, scale, and rarity.</p>
            <div class="price" id="modalPrice">$0.00</div>
            <button class="btn-buy">ADD TO CART</button>
        </div>
    </div>
</div>

<script>
    // 1. DATA (Images & Details)
    const animeProducts = [
        {
            id: 1,
            name: "Cyber Samurai Figure",
            price: "$189.00",
            img: "https://unsplash.com",
            desc: "A hand-painted 1/7 scale figure featuring LED neon elements and custom katanas. Strictly limited edition."
        },
        {
            id: 2,
            name: "Vagabond Wall Art",
            price: "$45.00",
            img: "https://unsplash.com",
            desc: "Museum-grade canvas print of the iconic Ronin. UV-resistant ink and authentic Japanese wood frame."
        },
        {
            id: 3,
            name: "Tech-Wear Shinobi Hoodie",
            price: "$95.00",
            img: "https://unsplash.com",
            desc: "Heavyweight 400GSM cotton with water-resistant panels and hidden tactical pockets."
        }
    ];

    // 2. RENDER PRODUCTS
    const grid = document.getElementById('productGrid');
    animeProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => openModal(product);
        card.innerHTML = `
            <img src="${product.img}">
            <div class="product-info">
                <h3>${product.name}</h3>
                <div class="price">${product.price}</div>
            </div>
        `;
        grid.appendChild(card);
    });

    // 3. MODAL LOGIC
    const modal = document.getElementById('productModal');
    
    function openModal(product) {
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalImg').src = product.img;
        document.getElementById('modalPrice').innerText = product.price;
        document.getElementById('modalDesc').innerText = product.desc;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Stop scrolling
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto'; // Resume scrolling
    }

    // Close on outside click
    window.onclick = (e) => { if(e.target == modal) closeModal(); }

    // 4. THEME TOGGLE
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>

</body>
</html>
